<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex,nofollow">
  <title>Open in Obsidian</title>
  <style>
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; margin: 2rem; line-height: 1.45; max-width: 42rem; }
    code { background: #f3f3f3; padding: 0.12rem 0.25rem; border-radius: 4px; word-break: break-all; }
    a.button { display: inline-block; margin-top: 1rem; padding: 0.7rem 1rem; border-radius: 8px; background: #5b4bdb; color: white; text-decoration: none; font-weight: 650; }
    .muted { color: #666; font-size: 0.95rem; }
  </style>
</head>
<body>
  <h1>Open in Obsidian</h1>
  <p id="status">Preparing link…</p>
  <p><a id="open" class="button" href="#">Open in Obsidian</a></p>
  <p class="muted">This page is a thin HTTPS wrapper for Telegram. It redirects your browser to Obsidian using the local path in the URL. It stores nothing.</p>
  <p class="muted">Target: <code id="target"></code></p>

<script>
(function () {
  const params = new URLSearchParams(window.location.search);
  const path = params.get('path');
  const vault = params.get('vault');
  const file = params.get('file') || params.get('filepath');
  const dailyDiary = params.get('daily_diary');
  let uri = '';

  if (dailyDiary) {
    uri = 'obsidian://open?vault=' + encodeURIComponent('labart-Apr 2026') + '&file=' + encodeURIComponent('_Isaac/Daily Diary/' + dailyDiary + ' - Daily Diary.md');
  } else if (path) {
    uri = 'obsidian://open?path=' + encodeURIComponent(path);
  } else if (vault && file) {
    uri = 'obsidian://open?vault=' + encodeURIComponent(vault) + '&file=' + encodeURIComponent(file);
  } else if (file) {
    uri = 'obsidian://open?file=' + encodeURIComponent(file);
  }

  const status = document.getElementById('status');
  const open = document.getElementById('open');
  const target = document.getElementById('target');

  if (!uri) {
    status.textContent = 'Missing path or vault/file parameters.';
    open.style.display = 'none';
    return;
  }

  target.textContent = uri;
  open.href = uri;
  status.textContent = 'If Obsidian does not open automatically, tap the button below.';

  setTimeout(function () {
    window.location.href = uri;
  }, 250);
})();
</script>
</body>
</html>
